        window.onload = async () => {
            const status = document.getElementById('status');
            status.textContent = 'Iniciando migración...';
            
            for (let i = 0; i < casesToMigrate.length; i++) {
                const c = casesToMigrate[i];
                try {
                    status.textContent = `Migrando (${i+1}/${casesToMigrate.length}): ${c.name}`;
                    await contentService.addGlobalCase(c);
                } catch (e) {
                    console.error('Error migrando', c.name, e);
                }
            }
            
            status.innerHTML = '<span style="color:#10b981">¡Migración completada con éxito!</span><br><br><a href="admin.html" style="color:#2563EB">Ir al Panel Admin</a>';
        };
